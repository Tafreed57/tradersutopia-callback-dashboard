<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callback Dialer — TradersUtopia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 4px;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #64748b; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #16a34a; }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.success {
      display: block;
      background: #052e16;
      border: 1px solid #22c55e;
      color: #86efac;
    }
    .status.error {
      display: block;
      background: #2a0a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    .hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: -10px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Callback Dialer</h1>
    <p class="subtitle">Call a lead back using the TradersUtopia number</p>

    <label for="agentNumber">Your Phone Number</label>
    <input type="tel" id="agentNumber" placeholder="+14375053539" />
    <p class="hint">Your cell — we'll call YOU first, then bridge to the lead</p>

    <label for="leadNumber">Lead Phone Number</label>
    <input type="tel" id="leadNumber" placeholder="+13065551234" />
    <p class="hint">The lead you want to call back</p>

    <button id="callBtn" onclick="startCall()">Call Back</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    async function startCall() {
      const agentNumber = document.getElementById('agentNumber').value.trim();
      const leadNumber = document.getElementById('leadNumber').value.trim();
      const btn = document.getElementById('callBtn');
      const status = document.getElementById('status');

      // Basic validation
      if (!agentNumber || !leadNumber) {
        showStatus('error', 'Please fill in both phone numbers.');
        return;
      }
      if (!agentNumber.startsWith('+') || !leadNumber.startsWith('+')) {
        showStatus('error', 'Numbers must start with "+" and country code. Example: +14375053539');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Dialing...';
      status.style.display = 'none';

      try {
        const res = await fetch('/start-call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agentNumber,
            leadNumber,
            publicBaseUrl: window.location.origin // auto-detect
          })
        });

        const data = await res.json();

        if (data.ok) {
          showStatus('success', 'Call started! Your phone will ring shortly. Pick up to connect to the lead.');
        } else {
          showStatus('error', 'Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        showStatus('error', 'Could not reach server: ' + err.message);
      }

      btn.disabled = false;
      btn.textContent = 'Call Back';
    }

    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = 'status ' + type;
      status.textContent = message;
      status.style.display = 'block';
    }

    // Allow Enter key to trigger call
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startCall();
    });
  </script>
</body>
</html>
